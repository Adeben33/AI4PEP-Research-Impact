name: 🔁 Research Impact Full Run

on:
permissions:
  contents: write

jobs:
  update-impact-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🧠 Run Full Research Impact Script
        run: |
          python research_impact.py || echo "⚠️ Script encountered errors but continuing to commit results."

      - name: 📤 Commit & Push Updated Files (even if script failed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "🔁 Partial/full run update: $(date -u '+%Y-%m-%d %H:%M')" || echo "No changes to commit"

          if ! git diff-index --quiet HEAD; then
            echo "Changes detected, pushing to main..."
            git stash
            git pull --rebase origin main || echo "Nothing to rebase"
            git stash pop || echo "Nothing to pop"
            git push || echo "Push failed, but workflow continues"
          else
            echo "✅ No new changes to push."
          fi
